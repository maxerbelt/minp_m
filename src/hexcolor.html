<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title id="page-title" data-template="HexColor">HexColor</title>
    <meta name="description" content="HexColor" />
    <link
      id="favicon"
      rel="icon"
      type="image/png"
      href="./terrains/sky/images/favicons/favicon-48x48.png"
    />
    <link rel="stylesheet" href="./styles/default.css" id="terrainTheme" />
  </head>
  <body class="hidden-hex">
    <style>
      .hexcolor-page {
        display: grid;
        gap: 20px;
        padding: 16px;
      }
      .board-panel,
      .status-panel,
      .controls-panel {
        display: grid;
        gap: 12px;
      }
      .controls-panel {
        text-align: center;
      }
      .button-row,
      .line-tools,
      .cover-type-group {
        display: inline-flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        justify-content: center;
      }
      .line-tool-group {
        display: inline-flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }
      .line-tool-group label,
      .cover-type-group label {
        cursor: pointer;
      }
      .line-tool-group select,
      .cover-type-group select {
        margin-left: 8px;
        padding: 4px 8px;
        cursor: pointer;
      }
      #hexcolor-controls button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .screen-reader-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>

    <main class="hexcolor-page">
      <header>
        <h1>HexColor</h1>
      </header>

      <section class="board-panel" aria-label="HexColor board">
        <div class="hexcolor" id="hexcolor-game">
          <canvas id="hexcolor-c" width="600" height="600"></canvas>
        </div>
      </section>

      <section class="status-panel" aria-label="HexColor status">
        <div id="hexcolor-symmetry" style="font-weight: bold">Symmetry:</div>
        <div id="hexcolor-symmetry-details" style="font-size: smaller"></div>
        <div
          id="hexcolor-hover-info"
          style="font-size: 12px; color: #666; height: 20px"
        >
          Hover info:
        </div>
      </section>

      <section
        id="hexcolor-controls"
        class="controls-panel"
        aria-label="HexColor controls"
      >
        <div class="button-row">
          <button id="hexcolor-rotateBtn" type="button">Rotate 60°</button>
          <button id="hexcolor-dilateBtn" type="button">Dilate</button>
          <button id="hexcolor-erodeBtn" type="button">Erode</button>
        </div>

        <div
          id="hexcolor-flipButtons"
          class="button-row"
          aria-label="HexColor flips"
        ></div>

        <div
          id="hexcolor-gridButtons"
          class="button-row"
          aria-label="HexColor grid actions"
        >
          <button id="hexcolor-empty" type="button">Empty</button>
          <button id="hexcolor-full" type="button">Full</button>
          <button id="hexcolor-inverse" type="button">Inverse</button>
        </div>

        <div
          id="hexcolor-lineTools"
          class="line-tools"
          aria-label="HexColor line tools"
        >
          <div class="line-tool-group">
            <label
              ><input
                type="radio"
                name="hexcolor-line-tool"
                value="single"
                checked
              />
              Single</label
            >
            <label
              ><input type="radio" name="hexcolor-line-tool" value="segment" />
              Segment</label
            >
            <label
              ><input type="radio" name="hexcolor-line-tool" value="ray" />
              Ray</label
            >
            <label
              ><input type="radio" name="hexcolor-line-tool" value="full" />
              Line</label
            >
            <label for="hexcolor-line-action">Action</label>
            <select id="hexcolor-line-action">
              <option value="set">Set</option>
              <option value="clear">Clear</option>
              <option value="toggle">Toggle</option>
            </select>
          </div>
          <div class="cover-type-group" aria-label="HexColor coverage type">
            <label
              ><input
                type="radio"
                name="hexcolor-line-cover"
                value="normal"
                checked
              />
              Normal</label
            >
            <label
              ><input
                type="radio"
                name="hexcolor-line-cover"
                value="superCover"
              />
              SuperCover</label
            >
            <label
              ><input
                type="radio"
                name="hexcolor-line-cover"
                value="halfCover"
              />
              HalfCover</label
            >
          </div>
        </div>

        <div
          class="button-row"
          style="margin-left: 10px"
          aria-label="HexColor color selection"
        >
          <label for="hex-color">Color:</label>
          <select id="hex-color">
            <option value="1">Color 1</option>
            <option value="2">Color 2</option>
            <option value="cycle">Cycle</option>
          </select>
        </div>
      </section>
    </main>

    <script type="module" src="./hexcolor.js"></script>
  </body>
</html>
