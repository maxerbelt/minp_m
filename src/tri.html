<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title id="page-title" data-template="Triangle">Triangle</title>
    <meta name="description" content="Triangle" />
    <link
      id="favicon"
      rel="icon"
      type="image/png"
      href="./terrains/river/images/favicons/favicon-48x48.png"
    />
    <link rel="stylesheet" href="./styles/default.css" id="terrainTheme" />
  </head>
  <body class="hidden-hex">
    <style>
      .tri-page {
        display: grid;
        gap: 20px;
        padding: 16px;
      }
      .board-panel,
      .info-panel,
      .controls-panel {
        display: grid;
        gap: 12px;
      }
      .controls-panel {
        text-align: center;
      }
      .button-row,
      .line-tools {
        display: inline-flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        align-items: center;
      }
      .line-tool-group {
        display: inline-flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }
      .line-tool-group label {
        margin: 0;
        cursor: pointer;
      }
      .line-tool-group select {
        margin-left: 8px;
        padding: 4px 8px;
        cursor: pointer;
      }
      #controls button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .screen-reader-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>

    <main class="tri-page">
      <header>
        <h1>Triangle</h1>
      </header>

      <section class="board-panel" aria-label="Triangle board">
        <div class="triangle" id="tri-game">
          <canvas id="c" width="600" height="600"></canvas>
        </div>
      </section>

      <section class="info-panel" aria-label="Triangle status">
        <div id="tri-symmetry" style="font-weight: bold">Symmetry:</div>
        <div id="tri-symmetry-details" style="font-size: smaller"></div>
        <div
          id="tri-hover-info"
          style="font-size: 12px; color: #666; height: 20px"
        >
          Hover info:
        </div>
      </section>

      <section
        id="controls"
        class="controls-panel"
        aria-label="Triangle controls"
      >
        <div class="button-row">
          <button id="rotateBtn" type="button">Rotate 120°</button>
          <button id="dilateBtn" type="button">Dilate</button>
          <button id="erodeBtn" type="button">Erode</button>
          <button id="crossDilateBtn" type="button">Cross Dilate</button>
        </div>

        <div
          id="flipButtons"
          class="button-row"
          aria-label="Triangle flip buttons"
        ></div>

        <div id="lineTools" class="line-tools" aria-label="Triangle line tools">
          <div class="line-tool-group">
            <label
              ><input
                type="radio"
                name="tri-line-tool"
                value="single"
                checked
              />
              Single</label
            >
            <label
              ><input type="radio" name="tri-line-tool" value="segment" />
              Segment</label
            >
            <label
              ><input type="radio" name="tri-line-tool" value="ray" />
              Ray</label
            >
            <label
              ><input type="radio" name="tri-line-tool" value="full" />
              Line</label
            >
            <label for="tri-line-action">Action</label>
            <select id="tri-line-action">
              <option value="set">Set</option>
              <option value="clear">Clear</option>
              <option value="toggle">Toggle</option>
            </select>
            <fieldset
              class="line-tools"
              style="border: none; padding: 0; margin: 0"
            >
              <legend class="screen-reader-only">Cover Type</legend>
              <label
                ><input
                  type="radio"
                  name="tri-cover-type"
                  value="normal"
                  checked
                />
                Normal</label
              >
              <label
                ><input type="radio" name="tri-cover-type" value="half" />
                Half</label
              >
              <label
                ><input type="radio" name="tri-cover-type" value="super" />
                Super</label
              >
            </fieldset>
          </div>
        </div>

        <div
          id="gridButtons"
          class="button-row"
          aria-label="Triangle grid actions"
        >
          <button id="empty" type="button">Empty</button>
          <button id="full" type="button">Full</button>
          <button id="inverse" type="button">Inverse</button>
        </div>
      </section>
    </main>

    <script type="module" src="./tri.js"></script>
  </body>
</html>
